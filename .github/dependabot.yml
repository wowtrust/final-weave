version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
    labels:
      - dependencies
    commit-message:
      prefix: "fix(deps)"
    groups:
      actions-updates:
        patterns:
          - "*"
